name: CI

on:
  push:
    branches:
      - main
  pull_request:


jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native library
        run: bun run build:native

      - name: Typecheck package entrypoints
        run: bunx tsc --noEmit