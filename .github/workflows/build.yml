name: Build

on:
  release:
    types:
      - created


jobs:

  build:

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest


    runs-on: ${{ matrix.os }}


    steps:

    - uses: actions/checkout@v4


    - name: Build
      run: |
        ./scripts/build.sh


    - uses: actions/upload-artifact@v4
      with:
        name: native-${{ matrix.os }}
        path: prebuilds/